<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rise-paper);font-family:var(--font-body);padding:26px 34px;}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:28px;}
  .fam .big{font-size:46px;line-height:1;color:var(--rise-ink);margin:0;}
  .fam .name{margin:12px 0 4px;font-weight:700;font-size:15px;color:var(--rise-ink);}
  .fam .role{font-size:12px;color:var(--rise-slate);}
  .fam .weights{margin-top:8px;font-size:13px;color:var(--rise-slate);}
  .display .big{font-family:var(--font-display);font-weight:800;}
  .body .big{font-family:var(--font-body);font-weight:500;}
</style></head>
<body>
<div class="two">
  <div class="fam display">
    <p class="big">Aa Gg 24</p>
    <p class="name">Sora — Display</p>
    <p class="role">Headlines, wordmark, stats, eyebrows</p>
    <p class="weights">Regular · Medium · SemiBold · Bold · ExtraBold</p>
  </div>
  <div class="fam body">
    <p class="big">Aa Gg 24</p>
    <p class="name">Plus Jakarta Sans — Body</p>
    <p class="role">Body copy, UI, labels, buttons</p>
    <p class="weights">Regular · Medium · SemiBold · Bold · Italic</p>
  </div>
</div>
</body></html>
