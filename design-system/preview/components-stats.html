<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-body);background:linear-gradient(135deg,var(--rise-charcoal) 0%,var(--rise-evergreen-600) 100%);padding:34px 38px;color:#fff;}
  .grid{display:flex;gap:40px;}
  .stat .n{font-family:var(--font-display);font-weight:800;font-size:52px;line-height:1;letter-spacing:-.02em;}
  .stat .n em{font-style:normal;color:var(--rise-gold);}
  .stat .l{font-size:14px;margin-top:8px;color:rgba(255,255,255,.82);}
</style></head>
<body>
<div class="grid">
  <div class="stat"><div class="n">1,200</div><div class="l">young people</div></div>
  <div class="stat"><div class="n">180</div><div class="l">professional mentors</div></div>
  <div class="stat"><div class="n">40<em>+</em></div><div class="l">partner organisations</div></div>
</div>
</body></html>
