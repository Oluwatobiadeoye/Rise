<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rise-white);font-family:var(--font-body);padding:28px 32px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .item{display:flex;flex-direction:column;gap:8px;}
  .chip{height:56px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
  .meta b{display:block;font-size:13px;color:var(--rise-ink);font-weight:700;}
  .meta span{font-size:11px;color:var(--rise-slate);font-family:'Sora',monospace;}
</style></head>
<body>
<div class="grid">
  <div class="item"><div class="chip" style="background:var(--success);color:#fff">Success</div><div class="meta"><b>--success</b><span>emerald #2E9E89</span></div></div>
  <div class="item"><div class="chip" style="background:var(--warning);color:#fff">Warning</div><div class="meta"><b>--warning</b><span>#A8884B</span></div></div>
  <div class="item"><div class="chip" style="background:var(--danger);color:#fff">Danger</div><div class="meta"><b>--danger</b><span>#0C4A40</span></div></div>
  <div class="item"><div class="chip" style="background:var(--info);color:#fff">Info</div><div class="meta"><b>--info</b><span>charcoal-400</span></div></div>
  <div class="item"><div class="chip" style="background:var(--success-tint);color:#237E6D">Success tint</div><div class="meta"><b>--success-tint</b><span>#E4F4F0</span></div></div>
  <div class="item"><div class="chip" style="background:var(--warning-tint);color:#9a6c0a">Warning tint</div><div class="meta"><b>--warning-tint</b><span>#F8F3E8</span></div></div>
  <div class="item"><div class="chip" style="background:var(--primary-tint);color:#093931">Primary tint</div><div class="meta"><b>--primary-tint</b><span>#E6F0ED</span></div></div>
  <div class="item"><div class="chip" style="border:2px solid var(--primary);color:var(--primary);box-shadow:var(--ring)">Focus ring</div><div class="meta"><b>--ring</b><span>evergreen 30%</span></div></div>
</div>
</body></html>
