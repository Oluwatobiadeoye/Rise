<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rise-white);font-family:var(--font-body);padding:28px 32px;}
  .row{display:flex;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{flex:1;height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;}
  .sw b{font-size:12px;font-weight:700;}
  .sw span{font-size:11px;opacity:.85;font-family:'Sora',monospace;}
  .cap{margin:0 0 16px;font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--rise-ink);}
  .cap small{font-weight:500;color:var(--rise-slate);font-family:var(--font-body);font-size:13px;margin-left:8px;}
</style></head>
<body>
<p class="cap">Charcoal — secondary <small>credibility · dark sections · the horizon</small></p>
<div class="row">
  <div class="sw" style="background:var(--rise-charcoal-50);color:#1F2933"><b>50</b><span>#ECEEF0</span></div>
  <div class="sw" style="background:var(--rise-charcoal-100);color:#1F2933"><b>100</b><span>#CDD2D7</span></div>
  <div class="sw" style="background:var(--rise-charcoal-400);color:#fff"><b>400</b><span>#586471</span></div>
  <div class="sw" style="background:var(--rise-charcoal);color:#fff"><b>500 ●</b><span>#1F2933</span></div>
  <div class="sw" style="background:var(--rise-charcoal-700);color:#fff"><b>700</b><span>#161D25</span></div>
  <div class="sw" style="background:var(--rise-charcoal-900);color:#fff"><b>900</b><span>#0A2620</span></div>
</div>
</body></html>
