<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rise-white);font-family:var(--font-body);padding:28px 32px;}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{flex:1;height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;}
  .sw b{font-size:12px;font-weight:700;}
  .sw span{font-size:11px;opacity:.85;font-family:'Sora',monospace;}
  .cap{margin:0 0 16px;font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--rise-ink);}
  .cap small{font-weight:500;color:var(--rise-slate);font-family:var(--font-body);font-size:13px;margin-left:8px;}
</style></head>
<body>
<p class="cap">Evergreen — primary <small>energy · the rise · actions</small></p>
<div class="row">
  <div class="sw" style="background:var(--rise-evergreen-50);color:#8a3a1c"><b>50</b><span>#E6F0ED</span></div>
  <div class="sw" style="background:var(--rise-evergreen-100);color:#8a3a1c"><b>100</b><span>#C2DBD5</span></div>
  <div class="sw" style="background:var(--rise-evergreen-300);color:#fff"><b>300</b><span>#5E9489</span></div>
  <div class="sw" style="background:var(--rise-evergreen);color:#fff"><b>500 ●</b><span>#0F5B4F</span></div>
  <div class="sw" style="background:var(--rise-evergreen-600);color:#fff"><b>600</b><span>#0C4A40</span></div>
  <div class="sw" style="background:var(--rise-evergreen-700);color:#fff"><b>700</b><span>#093931</span></div>
</div>
</body></html>
