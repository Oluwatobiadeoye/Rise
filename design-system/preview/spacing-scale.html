<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rise-white);font-family:var(--font-body);padding:28px 34px;}
  .cap{margin:0 0 16px;font-family:var(--font-display);font-weight:700;font-size:17px;color:var(--rise-ink);}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:9px;}
  .bar{height:18px;background:var(--rise-evergreen);border-radius:4px;}
  .lab{font-family:'Sora',monospace;font-size:12px;color:var(--rise-slate);width:120px;}
</style></head>
<body>
<p class="cap">Spacing — 4px base</p>
<div class="row"><span class="lab">1 · 4px</span><span class="bar" style="width:4px"></span></div>
<div class="row"><span class="lab">2 · 8px</span><span class="bar" style="width:8px"></span></div>
<div class="row"><span class="lab">3 · 12px</span><span class="bar" style="width:12px"></span></div>
<div class="row"><span class="lab">4 · 16px</span><span class="bar" style="width:16px"></span></div>
<div class="row"><span class="lab">5 · 24px</span><span class="bar" style="width:24px"></span></div>
<div class="row"><span class="lab">6 · 32px</span><span class="bar" style="width:32px"></span></div>
<div class="row"><span class="lab">8 · 48px</span><span class="bar" style="width:48px"></span></div>
<div class="row"><span class="lab">10 · 64px</span><span class="bar" style="width:64px"></span></div>
<div class="row"><span class="lab">12 · 96px</span><span class="bar" style="width:96px"></span></div>
</body></html>
