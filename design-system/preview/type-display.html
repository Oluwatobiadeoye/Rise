<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rise-paper);font-family:var(--font-body);padding:30px 36px;}
  .eyebrow{font-family:var(--font-body);font-weight:700;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin:0 0 10px;}
  .disp{font-family:var(--font-display);font-weight:800;font-size:62px;line-height:1.02;letter-spacing:-0.03em;color:var(--rise-ink);margin:0;}
  .disp em{font-style:normal;color:var(--primary);}
  .meta{margin:18px 0 0;font-size:12px;color:var(--rise-slate);font-family:'Sora',monospace;}
</style></head>
<body>
  <p class="eyebrow">Youth leadership</p>
  <p class="disp">Rise into your<br><em>potential.</em></p>
  <p class="meta">Sora ExtraBold · 62/63 · tracking −0.03em — display headline</p>
</body></html>
