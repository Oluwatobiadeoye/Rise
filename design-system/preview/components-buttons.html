<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rise-white);font-family:var(--font-body);padding:30px 34px;}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
  .row:last-child{margin-bottom:0;}
  .btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-body);font-weight:600;font-size:15px;border:0;cursor:pointer;border-radius:var(--radius-pill);padding:13px 24px;line-height:1;}
  .btn i{width:17px;height:17px;}
  .primary{background:var(--primary);color:#fff;box-shadow:var(--shadow-evergreen);}
  .primary.hover{background:var(--primary-hover);}
  .primary.press{background:var(--primary-press);transform:scale(.97);}
  .secondary{background:var(--rise-charcoal);color:#fff;}
  .outline{background:transparent;color:var(--rise-charcoal);box-shadow:inset 0 0 0 2px var(--rise-charcoal);}
  .ghost{background:transparent;color:var(--primary);}
  .sm{padding:9px 16px;font-size:13px;}
  .tag{font-size:11px;color:var(--rise-mist);font-family:'Sora',monospace;width:100%;}
</style></head>
<body>
  <span class="tag">PRIMARY — default · hover · pressed</span>
  <div class="row">
    <button class="btn primary">Join the next cohort <i data-lucide="arrow-right"></i></button>
    <button class="btn primary hover">Join the next cohort <i data-lucide="arrow-right"></i></button>
    <button class="btn primary press">Join the next cohort <i data-lucide="arrow-right"></i></button>
  </div>
  <span class="tag">SECONDARY · OUTLINE · GHOST</span>
  <div class="row">
    <button class="btn secondary">Become a mentor</button>
    <button class="btn outline">Partner with us</button>
    <button class="btn ghost">Learn more <i data-lucide="arrow-up-right"></i></button>
    <button class="btn primary sm">Apply</button>
  </div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body></html>
