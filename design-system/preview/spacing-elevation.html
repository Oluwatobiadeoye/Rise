<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rise-paper);font-family:var(--font-body);padding:34px;}
  .grid{display:flex;gap:26px;align-items:center;flex-wrap:wrap;}
  .item{text-align:center;}
  .box{width:108px;height:72px;background:var(--rise-white);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--rise-slate);}
  .lab{margin-top:12px;font-size:12px;color:var(--rise-slate);}
  .lab b{display:block;color:var(--rise-ink);font-size:13px;}
</style></head>
<body>
<div class="grid">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)">sm</div><div class="lab"><b>shadow-sm</b>inputs, chips</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)">md</div><div class="lab"><b>shadow-md</b>cards</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)">lg</div><div class="lab"><b>shadow-lg</b>modals, hover</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-evergreen);background:var(--rise-evergreen);color:#fff">evergreen</div><div class="lab"><b>shadow-evergreen</b>primary CTA glow</div></div>
</div>
</body></html>
