<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rise-white);font-family:var(--font-body);padding:28px 32px;}
  .pair{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .grp b{display:block;font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--rise-ink);margin-bottom:10px;}
  .grp small{font-weight:500;color:var(--rise-slate);font-family:var(--font-body);font-size:12px;}
  .row{display:flex;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{flex:1;height:90px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px 11px;}
  .sw i{font-style:normal;font-size:11px;font-weight:700;}
  .sw span{font-size:10px;opacity:.85;font-family:'Sora',monospace;}
</style></head>
<body>
<div class="pair">
  <div class="grp"><b>Emerald <small>growth · connection · success</small></b>
    <div class="row">
      <div class="sw" style="background:var(--rise-emerald-50);color:#237E6D"><i>50</i><span>#E4F4F0</span></div>
      <div class="sw" style="background:var(--rise-emerald-100);color:#237E6D"><i>100</i><span>#BEE6DD</span></div>
      <div class="sw" style="background:var(--rise-emerald);color:#fff"><i>500 ●</i><span>#2E9E89</span></div>
      <div class="sw" style="background:var(--rise-emerald-600);color:#fff"><i>600</i><span>#237E6D</span></div>
    </div>
  </div>
  <div class="grp"><b>Gold <small>accent · highlights only</small></b>
    <div class="row">
      <div class="sw" style="background:var(--rise-gold-50);color:#9a6c0a"><i>50</i><span>#F8F3E8</span></div>
      <div class="sw" style="background:var(--rise-gold-100);color:#9a6c0a"><i>100</i><span>#EFE3C9</span></div>
      <div class="sw" style="background:var(--rise-gold);color:#1F2933"><i>500 ●</i><span>#C9A86A</span></div>
      <div class="sw" style="background:var(--rise-gold-600);color:#fff"><i>600</i><span>#A8884B</span></div>
    </div>
  </div>
</div>
</body></html>
