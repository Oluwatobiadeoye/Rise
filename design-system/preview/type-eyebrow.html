<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rise-white);font-family:var(--font-body);padding:30px 34px;display:flex;gap:40px;flex-wrap:wrap;align-items:center;}
  .eb{font-weight:700;font-size:14px;letter-spacing:.16em;text-transform:uppercase;}
  .c1{color:var(--primary);} .c2{color:var(--rise-emerald);} .c3{color:var(--rise-slate);}
  .note{font-size:13px;color:var(--rise-slate);max-width:220px;line-height:1.5;margin-left:auto;}
</style></head>
<body>
  <span class="eb c1">Leadership program</span>
  <span class="eb c2">Mentorship network</span>
  <span class="eb c3">Community impact</span>
  <p class="note">Eyebrows / kickers: uppercase, +0.16em tracking, bold. The only place RISE uses all-caps.</p>
</body></html>
