<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rise-white);font-family:var(--font-body);padding:26px 32px;}
  .cap{margin:0 0 6px;font-family:var(--font-display);font-weight:700;font-size:17px;color:var(--rise-ink);}
  .sub{margin:0 0 18px;font-size:13px;color:var(--rise-slate);}
  .opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}
  .opt b{display:block;font-size:13px;font-weight:700;color:var(--rise-ink);margin-bottom:8px;}
  .opt .dots{display:flex;gap:8px;}
  .dot{width:42px;height:42px;border-radius:var(--radius-pill);box-shadow:var(--shadow-sm);}
  .star{color:var(--primary);font-size:11px;font-weight:700;letter-spacing:.06em;}
</style></head>
<body>
<p class="cap">Palette directions to compare</p>
<p class="sub">Evergreen & Gold is the recommended primary. Two alternates shown for the "explore a few" brief.</p>
<div class="opts">
  <div class="opt"><b>Evergreen & Gold <span class="star">★ RECOMMENDED</span></b>
    <div class="dots">
      <span class="dot" style="background:#1F2933"></span>
      <span class="dot" style="background:#0F5B4F"></span>
      <span class="dot" style="background:#2E9E89"></span>
      <span class="dot" style="background:#C9A86A"></span>
    </div>
  </div>
  <div class="opt"><b>Bold &amp; hopeful</b>
    <div class="dots">
      <span class="dot" style="background:#16357A"></span>
      <span class="dot" style="background:#2FB6C9"></span>
      <span class="dot" style="background:#FF8A3D"></span>
      <span class="dot" style="background:#F5D547"></span>
    </div>
  </div>
  <div class="opt"><b>Earthy &amp; grounded</b>
    <div class="dots">
      <span class="dot" style="background:#3C5A3F"></span>
      <span class="dot" style="background:#C76B3F"></span>
      <span class="dot" style="background:#7BA05B"></span>
      <span class="dot" style="background:#E7C36B"></span>
    </div>
  </div>
</div>
</body></html>
