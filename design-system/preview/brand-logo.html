<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rise-paper);font-family:var(--font-body);}
  .card{display:flex;align-items:center;gap:28px;padding:32px 36px;}
  .markbox{width:96px;height:96px;flex:none;}
  .markbox img{width:100%;height:100%;display:block;}
  .lk{font-family:var(--font-display);font-weight:800;font-size:46px;letter-spacing:-0.03em;line-height:1;color:var(--rise-ink);}
  .lk .sub{display:block;font-family:var(--font-body);font-weight:600;font-size:13px;letter-spacing:0.34em;text-transform:uppercase;color:var(--rise-slate);margin-top:6px;}
  .note{margin-left:auto;max-width:210px;font-size:13px;line-height:1.5;color:var(--rise-slate);}
</style></head>
<body><div class="card">
  <div class="markbox"><img src="../assets/logo-mark.svg" alt="RISE mark"></div>
  <div class="lk">RISE<span class="sub">Initiative</span></div>
  <div class="note">Three ascending figures — young people developing &amp; rising together. Evergreen & Gold palette.</div>
</div></body></html>
