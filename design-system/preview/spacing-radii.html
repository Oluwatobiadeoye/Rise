<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rise-white);font-family:var(--font-body);padding:28px 34px;}
  .grid{display:flex;gap:20px;align-items:flex-end;flex-wrap:wrap;}
  .item{text-align:center;}
  .box{width:84px;height:84px;background:var(--rise-evergreen-100);border:2px solid var(--rise-evergreen);}
  .lab{margin-top:10px;font-size:12px;color:var(--rise-slate);}
  .lab b{display:block;color:var(--rise-ink);font-size:13px;}
</style></head>
<body>
<div class="grid">
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="lab"><b>sm</b>8px · chips</div></div>
  <div class="item"><div class="box" style="border-radius:14px"></div><div class="lab"><b>md</b>14px · buttons, inputs</div></div>
  <div class="item"><div class="box" style="border-radius:20px"></div><div class="lab"><b>lg</b>20px · cards, images</div></div>
  <div class="item"><div class="box" style="border-radius:28px"></div><div class="lab"><b>xl</b>28px · large panels</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="lab"><b>pill</b>999px · CTAs, tags</div></div>
</div>
</body></html>
