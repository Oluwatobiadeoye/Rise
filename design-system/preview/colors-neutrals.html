<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--rise-white);font-family:var(--font-body);padding:28px 32px;}
  .row{display:flex;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border);}
  .sw{flex:1;height:100px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;}
  .sw b{font-size:12px;font-weight:700;}
  .sw span{font-size:10px;opacity:.8;font-family:'Sora',monospace;}
  .cap{margin:0 0 16px;font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--rise-ink);}
  .cap small{font-weight:500;color:var(--rise-slate);font-family:var(--font-body);font-size:13px;margin-left:8px;}
</style></head>
<body>
<p class="cap">Warm neutrals <small>text, surfaces, lines</small></p>
<div class="row">
  <div class="sw" style="background:var(--rise-ink);color:#fff"><b>Ink</b><span>#1F2933 · text</span></div>
  <div class="sw" style="background:var(--rise-slate);color:#fff"><b>Slate</b><span>#4B5563 · muted</span></div>
  <div class="sw" style="background:var(--rise-mist);color:#fff"><b>Mist</b><span>#8A929E · subtle</span></div>
  <div class="sw" style="background:var(--rise-line);color:#4B5563"><b>Line</b><span>#E5E1D8 · border</span></div>
  <div class="sw" style="background:var(--rise-cloud);color:#4B5563"><b>Cloud</b><span>#EFEBE2 · fill</span></div>
  <div class="sw" style="background:var(--rise-paper);color:#4B5563"><b>Paper</b><span>#F7F5F0 · bg</span></div>
  <div class="sw" style="background:var(--rise-white);color:#4B5563"><b>White</b><span>#FFFFFF</span></div>
</div>
</body></html>
